name: "Release"

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      compile:
        description: "Compile TypeScript"
        type: boolean
        default: true
      pack:
        description: "Package add-on"
        type: boolean
        default: true
      release:
        description: "Publish GitHub Release"
        type: boolean
        default: false
      notify:
        description: "Send Discord notification"
        type: boolean
        default: true
      fake-version:
        description: "Version string for packaging (e.g. 0.0.0-test)"
        type: string
        default: "0.0.0-test"
      force-prerelease:
        description: "Force beta webhook for notification test"
        type: boolean
        default: false
      webhook-override:
        description: "Paste a webhook URL here to test without touching secrets"
        type: string
        default: ""
      webhook-beta-override:
        description: "Paste a beta webhook URL here to test without touching secrets"
        type: string
        default: ""

jobs:
  # ── Full release pipeline (triggered by tag push) ───────────────────────────
  release:
    if: github.event_name == 'push'
    uses: YOUR-ORG/addon-ci/.github/workflows/release.yml@v1
    with:
      addon-name: "My Awesome Addon"   # ← set your display name
    secrets:
      DISCORD_WEBHOOK:      ${{ secrets.DISCORD_WEBHOOK }}
      DISCORD_WEBHOOK_BETA: ${{ secrets.DISCORD_WEBHOOK_BETA }}

  # ── Manual test dispatch ────────────────────────────────────────────────────
  test:
    if: github.event_name == 'workflow_dispatch'
    uses: YOUR-ORG/addon-ci/.github/workflows/test-dispatch.yml@v1
    with:
      addon-name:           "My Awesome Addon"   # ← same display name
      compile:              ${{ inputs.compile }}
      pack:                 ${{ inputs.pack }}
      release:              ${{ inputs.release }}
      notify:               ${{ inputs.notify }}
      fake-version:         ${{ inputs.fake-version }}
      force-prerelease:     ${{ inputs.force-prerelease }}
      webhook-override:     ${{ inputs.webhook-override }}
      webhook-beta-override: ${{ inputs.webhook-beta-override }}
    secrets:
      DISCORD_WEBHOOK:      ${{ secrets.DISCORD_WEBHOOK }}
      DISCORD_WEBHOOK_BETA: ${{ secrets.DISCORD_WEBHOOK_BETA }}
