name: "Addon – Full Release Pipeline"

on:
  workflow_call:
    inputs:
      addon-name:
        description: "Human-readable name of the add-on (defaults to repo name)"
        type: string
        required: false
        default: ""
      working-directory:
        description: "Root folder of the add-on inside the repo"
        type: string
        required: false
        default: "."
      release-notes-path:
        description: "Path to release_notes.md relative to working-directory"
        type: string
        required: false
        default: "release_notes.md"
      compile:
        description: "Run the TypeScript compilation step"
        type: boolean
        required: false
        default: true
      pack:
        description: "Run the packaging step"
        type: boolean
        required: false
        default: true
      release:
        description: "Publish a GitHub Release"
        type: boolean
        required: false
        default: true
      notify:
        description: "Send Discord notification"
        type: boolean
        required: false
        default: true
    secrets:
      DISCORD_WEBHOOK:
        description: "Discord webhook URL for stable releases"
        required: true
      DISCORD_WEBHOOK_BETA:
        description: "Discord webhook URL for beta/pre-release builds"
        required: false

jobs:
  compile:
    name: "Compile TypeScript"
    if: ${{ inputs.compile }}
    runs-on: ubuntu-latest
    outputs:
      ts-compiled: ${{ steps.compile.outputs.ts-compiled }}
    steps:
      - uses: actions/checkout@v4
      - name: Compile TS
        id: compile
        uses: YOUR-ORG/addon-ci/actions/compile-ts@v1
        with:
          working-directory: ${{ inputs.working-directory }}

  release:
    name: "Package & Release"
    runs-on: ubuntu-latest
    needs: compile
    if: ${{ always() && !failure() && inputs.pack && startsWith(github.ref, 'refs/tags/v') }}
    outputs:
      release-url:   ${{ steps.release.outputs.release-url }}
      package-name:  ${{ steps.package.outputs.package-name }}
      package-path:  ${{ steps.package.outputs.package-path }}
      addon-type:    ${{ steps.package.outputs.addon-type }}
      is-prerelease: ${{ steps.release.outputs.is-prerelease }}
      version:       ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Package add-on
        id: package
        uses: YOUR-ORG/addon-ci/actions/package-addon@v1
        with:
          working-directory: ${{ inputs.working-directory }}
          addon-name: ${{ inputs.addon-name != '' && inputs.addon-name || github.event.repository.name }}
          version:    ${{ steps.ver.outputs.version }}

      - name: Create GitHub Release
        id: release
        if: ${{ inputs.release }}
        uses: YOUR-ORG/addon-ci/actions/create-release@v1
        with:
          version:            ${{ steps.ver.outputs.version }}
          package-path:       ${{ steps.package.outputs.package-path }}
          package-name:       ${{ steps.package.outputs.package-name }}
          release-notes-path: ${{ inputs.release-notes-path }}
          github-token:       ${{ github.token }}

  notify:
    name: "Notify Discord"
    runs-on: ubuntu-latest
    needs: release
    if: ${{ always() && !failure() && inputs.notify && needs.release.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Send notification
        uses: YOUR-ORG/addon-ci/actions/notify-discord@v1
        with:
          version:            ${{ needs.release.outputs.version }}
          addon-name:         ${{ inputs.addon-name != '' && inputs.addon-name || github.event.repository.name }}
          release-url:        ${{ needs.release.outputs.release-url }}
          package-name:       ${{ needs.release.outputs.package-name }}
          addon-type:         ${{ needs.release.outputs.addon-type }}
          is-prerelease:      ${{ needs.release.outputs.is-prerelease }}
          release-notes-path: ${{ inputs.release-notes-path }}
          webhook-url:        ${{ secrets.DISCORD_WEBHOOK }}
          webhook-url-beta:   ${{ secrets.DISCORD_WEBHOOK_BETA }}
