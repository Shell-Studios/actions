name: "Addon – Manual Test Dispatch"

on:
  workflow_call:
    inputs:
      compile:
        description: "Run TypeScript compilation"
        type: boolean
        required: false
        default: true
      pack:
        description: "Run packaging"
        type: boolean
        required: false
        default: true
      release:
        description: "Publish GitHub Release"
        type: boolean
        required: false
        default: false
      notify:
        description: "Send Discord notification"
        type: boolean
        required: false
        default: true
      addon-name:
        type: string
        required: false
        default: ""
      working-directory:
        type: string
        required: false
        default: "."
      release-notes-path:
        type: string
        required: false
        default: "release_notes.md"
      fake-version:
        description: "Version string to use when packaging (no real tag needed)"
        type: string
        required: false
        default: "0.0.0-test"
      force-prerelease:
        description: "Simulate a beta notification even without a -beta tag"
        type: boolean
        required: false
        default: false
      webhook-override:
        description: "Custom webhook URL — overrides DISCORD_WEBHOOK secret"
        type: string
        required: false
        default: ""
      webhook-beta-override:
        description: "Custom beta webhook URL — overrides DISCORD_WEBHOOK_BETA secret"
        type: string
        required: false
        default: ""
    secrets:
      DISCORD_WEBHOOK:
        required: false
      DISCORD_WEBHOOK_BETA:
        required: false

  workflow_dispatch:
    inputs:
      compile:
        description: "Compile TypeScript"
        type: boolean
        default: true
      pack:
        description: "Package add-on"
        type: boolean
        default: true
      release:
        description: "Publish GitHub Release"
        type: boolean
        default: false
      notify:
        description: "Send Discord notification"
        type: boolean
        default: true
      fake-version:
        description: "Version string for packaging (e.g. 0.0.0-test)"
        type: string
        default: "0.0.0-test"
      force-prerelease:
        description: "Force beta webhook for notification test"
        type: boolean
        default: false
      webhook-override:
        description: "Paste a webhook URL here to test without touching secrets"
        type: string
        default: ""
      webhook-beta-override:
        description: "Paste a beta webhook URL here to test without touching secrets"
        type: string
        default: ""

jobs:
  compile:
    name: "Test: Compile TS"
    if: ${{ inputs.compile }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shell-studios/actions/actions/compile-ts@v1
        with:
          working-directory: ${{ inputs.working-directory }}

  pack:
    name: "Test: Package"
    if: ${{ inputs.pack }}
    runs-on: ubuntu-latest
    needs: compile
    outputs:
      package-name: ${{ steps.package.outputs.package-name }}
      package-path: ${{ steps.package.outputs.package-path }}
      addon-type:   ${{ steps.package.outputs.addon-type }}
    steps:
      - uses: actions/checkout@v4

      - name: Package add-on (dry run)
        id: package
        uses: shell-studios/actions/actions/package-addon@v1
        with:
          working-directory: ${{ inputs.working-directory }}
          addon-name: ${{ inputs.addon-name != '' && inputs.addon-name || github.event.repository.name }}
          version:    ${{ inputs.fake-version }}

      - name: Upload artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-package
          path: ${{ steps.package.outputs.package-path }}
          retention-days: 3

  release:
    name: "Test: GitHub Release"
    if: ${{ inputs.pack && inputs.release }}
    runs-on: ubuntu-latest
    needs: pack
    outputs:
      release-url: ${{ steps.release.outputs.release-url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        id: release
        uses: shell-studios/actions/actions/create-release@v1
        with:
          version:            ${{ inputs.fake-version }}
          package-path:       ${{ needs.pack.outputs.package-path }}
          package-name:       ${{ needs.pack.outputs.package-name }}
          release-notes-path: ${{ inputs.release-notes-path }}
          github-token:       ${{ github.token }}

  notify:
    name: "Test: Discord Notification"
    if: ${{ always() && !failure() && inputs.notify }}
    runs-on: ubuntu-latest
    needs: [pack, release]
    steps:
      - uses: actions/checkout@v4
      - name: Send notification
        uses: shell-studios/actions/actions/notify-discord@v1
        with:
          version:            ${{ inputs.fake-version }}
          addon-name:         "${{ inputs.addon-name != '' && inputs.addon-name || github.event.repository.name }} [TEST]"
          release-url:        ${{ needs.release.outputs.release-url != '' && needs.release.outputs.release-url || format('https://github.com/{0}', github.repository) }}
          package-name:       ${{ needs.pack.outputs.package-name != '' && needs.pack.outputs.package-name || 'dry-run.mcaddon' }}
          addon-type:         ${{ needs.pack.outputs.addon-type != '' && needs.pack.outputs.addon-type || 'mcaddon' }}
          is-prerelease:      ${{ inputs.force-prerelease }}
          release-notes-path: ${{ inputs.release-notes-path }}
          webhook-url:        ${{ inputs.webhook-override != '' && inputs.webhook-override || secrets.DISCORD_WEBHOOK }}
          webhook-url-beta:   ${{ inputs.webhook-beta-override != '' && inputs.webhook-beta-override || secrets.DISCORD_WEBHOOK_BETA }}
